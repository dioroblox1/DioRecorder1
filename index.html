<!DOCTYPE html>
<html lang="ru">
<head> 
    <link rel="manifest" href="manifest.json">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DioRecorder — v1.0.0</title>
    <style>
        :root { 
            --bg: #050505; 
            --primary: #ffffff; 
            --accent: #ef4444; 
            --pause: #f59e0b; 
            --surface: #121212; 
            --dio-color: #3b82f6; 
        }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--primary); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .container { 
            background: var(--surface); 
            padding: 30px; 
            border-radius: 32px; 
            border: 1px solid #222; 
            width: 90%; 
            max-width: 800px; 
            text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); 
            position: relative;
        }
        .brand { font-size: 1.2rem; letter-spacing: 3px; text-transform: uppercase; color: var(--dio-color); margin-bottom: 10px; font-weight: 900; }
        #timer { font-size: 3.5rem; font-weight: 800; margin-bottom: 20px; font-variant-numeric: tabular-nums; }
        
        .preview-box { 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            overflow: hidden; 
            border: 1px solid #333; 
        }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        .controls { display: flex; justify-content: center; align-items: center; gap: 25px; }
        
        .btn { border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); outline: none; }
        .main-btn { width: 85px; height: 85px; border-radius: 50%; background: var(--primary); }
        .pause-btn { width: 65px; height: 65px; border-radius: 50%; background: var(--pause); display: none; opacity: 0.8; }
        .pause-btn:hover { opacity: 1; transform: scale(1.05); }

        .icon { background: var(--bg); transition: 0.3s; }
        .rec-icon { width: 26px; height: 26px; border-radius: 50%; }
        .pause-bars { display: flex; gap: 5px; }
        .bar { width: 6px; height: 22px; background: var(--bg); border-radius: 3px; }

        .version-tag { position: absolute; bottom: 15px; right: 25px; font-size: 0.7rem; color: #444; font-weight: bold; }

        /* Состояния */
        .recording .main-btn { background: var(--accent); box-shadow: 0 0 25px rgba(239, 68, 68, 0.4); }
        .recording .rec-icon { border-radius: 4px; width: 30px; height: 30px; }
        .recording .pause-btn { display: flex; }
        .recording #timer { color: var(--accent); }
        
        .paused .pause-btn { background: var(--primary); animation: blink 1.5s infinite; }
        .paused #timer { color: var(--pause); opacity: 0.7; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .footer { margin-top: 20px; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="brand">DioRecorder</div>
    <div id="timer">00:00</div>

    <div class="preview-box">
        <video id="preview" autoplay muted></video>
    </div>
    
    <div class="controls">
        <button class="btn pause-btn" id="pauseBtn" title="Пауза/Продолжить">
            <div class="pause-bars"><div class="bar"></div><div class="bar"></div></div>
        </button>
        <button class="btn main-btn" id="toggleBtn" title="Старт/Стоп">
            <div class="icon rec-icon"></div>
        </button>
    </div>

    <div class="footer">By: Dio • 60 FPS • Ultra Quality</div>
    <div class="version-tag">v1.0.0</div>
</div>

<script>
    let mediaRecorder, recordedChunks = [], startTime, timerInterval, totalPausedTime = 0, pauseStart, isRecording = false;
    const toggleBtn = document.getElementById('toggleBtn'), pauseBtn = document.getElementById('pauseBtn'), 
          preview = document.getElementById('preview'), app = document.getElementById('app'), timerDisplay = document.getElementById('timer');

    async function toggleRecording() {
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { frameRate: 60, width: { ideal: 1920 }, height: { ideal: 1080 } }, 
                    audio: true 
                });
                
                preview.srcObject = stream;
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 8000000 });
                
                mediaRecorder.ondataavailable = e => e.data.size > 0 && recordedChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `DioRec_${new Date().toLocaleTimeString().replace(/:/g, '-')}.webm`;
                    a.click();
                    stream.getTracks().forEach(t => t.stop());
                    preview.srcObject = null;
                };

                mediaRecorder.start();
                isRecording = true; startTime = Date.now(); totalPausedTime = 0;
                app.classList.add('recording');
                timerInterval = setInterval(updateTimer, 1000);
            } catch (err) { console.error("Ошибка:", err); }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            app.classList.remove('recording', 'paused');
            clearInterval(timerInterval);
            timerDisplay.innerText = "00:00";
        }
    }

    pauseBtn.onclick = () => {
        if (mediaRecorder.state === "recording") {
            mediaRecorder.pause();
            pauseStart = Date.now();
            app.classList.add('paused');
        } else if (mediaRecorder.state === "paused") {
            mediaRecorder.resume();
            totalPausedTime += (Date.now() - pauseStart);
            app.classList.remove('paused');
        }
    };

    function updateTimer() {
        if (mediaRecorder.state === "paused") return;
        const d = new Date(Date.now() - startTime - totalPausedTime);
        const m = d.getUTCMinutes().toString().padStart(2,'0');
        const s = d.getUTCSeconds().toString().padStart(2,'0');
        timerDisplay.innerText = `${m}:${s}`;
    }

    toggleBtn.onclick = toggleRecording;
</script> 
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>  
</body>
</html>
